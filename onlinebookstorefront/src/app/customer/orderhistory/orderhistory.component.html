<app-customernav></app-customernav>
<div *ngIf="ordersItems.length > 0; else emptyOrder">
    <h2>Your orders</h2>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>Total Price</th>
          <th>Order Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of ordersItems">
          <td>{{ item.title }}</td>
          <td>{{ item.author }}</td>
          <td>{{ item.genre || 'N/A' }}</td>
          <td>${{ item.totalPrice.toFixed(2) }}</td>
          <td>${{ item.date }}</td>
        </tr>
      </tbody>
    </table>
    <h4>Total Price: ${{ totalPrice.toFixed(2) }}</h4>
  </div>

  <ng-template #emptyOrder>
    <p>Your order-history is empty.</p>
  </ng-template>
